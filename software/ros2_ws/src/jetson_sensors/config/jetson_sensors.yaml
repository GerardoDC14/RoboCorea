mlx90640_node:
  ros__parameters:
    bus: 7
    address: 51  # 0x33
    refresh_rate: 8
    publish_rate: 8.0
    frame_id: mlx90640_link
    raw_topic: /sensors/thermal_raw
    filtered_topic: /sensors/thermal
    status_topic: /sensors/thermal_status
    filter_alpha: 0.55
    use_dummy: false
    enable_mask_topic: /sensors/enable_mask
    enable_mask_bit: 1
    start_enabled: true

lis3mdl_node:
  ros__parameters:
    bus: 7
    address: 28  # 0x1c; use 30 (0x1e) if SDO/SA1 is strapped high
    publish_rate: 50.0
    frame_id: mag_link
    topic: /sensors/mag
    use_dummy: false
    enable_mask_topic: /sensors/enable_mask
    enable_mask_bit: 0
    start_enabled: true

thermal_visualizer_node:
  ros__parameters:
    input_topic: /sensors/thermal
    output_topic: /sensors/thermal_color
    visualization_scale: 10
    gaussian_sigma: 0.0
    auto_scale: true
    min_celsius: 15.0
    max_celsius: 45.0
    range_alpha: 0.2
